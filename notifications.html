<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDiary Notifications</title>
    <link rel="stylesheet" href="style/styles.css">
    <style>
        .notifications-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            min-height: 70vh;
        }
        .notification-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }
        .dark .notification-card {
            background: #2d2d2d;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            color: #eee;
        }
        .notification-card.unread {
            border-left-color: #ff4b2b;
            background: #fffafa;
        }
        .dark .notification-card.unread {
            background: #363030;
        }
        .notification-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #eee;
            flex-shrink: 0;
            object-fit: cover;
        }
        .notification-content {
            flex-grow: 1;
        }
        .notification-msg {
            margin: 0;
            font-size: 16px;
            line-height: 1.4;
        }
        .notification-msg strong {
            color: #333;
        }
        .dark .notification-msg strong {
            color: #fff;
        }
        .notification-time {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .notification-actions {
            display: flex;
            gap: 10px;
        }
        .btn-read {
            background: none;
            border: none;
            color: #ff4b2b;
            cursor: pointer;
            font-size: 14px;
        }
        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .btn-mark-all {
            padding: 8px 16px;
            background: #eee;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .dark .btn-mark-all {
            background: #444;
            color: #fff;
        }
        .btn-mark-all:hover {
            background: #ddd;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .notification-dot {
            width: 8px;
            height: 8px;
            background: #ff4b2b;
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
            vertical-align: middle;
        }
        .nav-link-notif {
            position: relative;
        }
        .unread-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: #ff4b2b;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<nav>
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>
    
    <div class="logo">UrbanDiary</div>
    
    <div class="nav-links">
        <a href="blog.html">Blogs</a>
        <a href="profile.html">Profile</a>
        <a href="library.html">Library</a>
        <a href="notifications.html" class="nav-link-notif">Notifications <span id="notifBadge" class="unread-badge" style="display:none">0</span></a>
        <a href="about.html">About</a>
        <a href="contactus.html">Contact Us</a>
    </div>
    
    <div class="user-info">
      <span id="userName" class="user-name"></span>
      <button class="btn-logout" id="logoutBtn">Logout ➜]</button>
    </div>
    
    <button class="toggle-btn" onclick="toggleDark()"><img src="assets/dark-mode-6682.svg" alt="Toggle"></button>
</nav>

<div class="notifications-container">
    <div class="notifications-header">
        <h1>Notifications</h1>
        <button id="markAllRead" class="btn-mark-all">Mark all as read</button>
    </div>

    <div id="notificationsFeed">
        <div class="empty-state">Loading notifications...</div>
    </div>
</div>

<footer>
  © 2026 UrbanDiary | Designed with Love
</footer>

<script src="js/auth.js"></script>
<script type="module">
    const API_URL = window.location.origin + '/api';
    const token = localStorage.getItem('token');
    const feed = document.getElementById('notificationsFeed');
    const badge = document.getElementById('notifBadge');
    const markAllBtn = document.getElementById('markAllRead');

    async function fetchNotifications() {
        try {
            const res = await fetch(`${API_URL}/notifications`, {
                headers: { 'x-auth-token': token }
            });
            if (!res.ok) {
                if (res.status === 401) {
                    window.location.href = 'login.html';
                    return;
                }
                throw new Error('Failed to fetch notifications');
            }
            const data = await res.json();
            renderNotifications(data);
        } catch (err) {
            feed.innerHTML = '<div class="empty-state">Failed to load notifications</div>';
            console.error(err);
        }
    }

    function renderNotifications(notifs) {
        if (notifs.length === 0) {
            feed.innerHTML = '<div class="empty-state">No notifications yet</div>';
            badge.style.display = 'none';
            return;
        }

        const unreadCount = notifs.filter(n => !n.isRead).length;
        if (unreadCount > 0) {
            badge.textContent = unreadCount;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }

        feed.innerHTML = notifs.map(n => `
            <div class="notification-card ${n.isRead ? '' : 'unread'}" data-id="${n._id}">
                <img src="${n.sender?.profilePic || 'assets/default-avatar.png'}" class="notification-avatar" onerror="this.src='https://via.placeholder.com/48'">
                <div class="notification-content">
                    <p class="notification-msg">
                        <strong>${n.sender?.username || 'Unknown User'}</strong> 
                        ${n.type === 'like' ? 'liked' : 'commented on'} 
                        ${n.blog ? 'your blog: "<em>' + n.blog.title + '</em>"' : 'a deleted blog'}
                        ${n.content ? `<br><small style="color: #666;">"${n.content}"</small>` : ''}
                    </p>
                    <div class="notification-time">${new Date(n.createdAt).toLocaleString()}</div>
                </div>
                ${!n.isRead ? `<button class="btn-read" onclick="markRead('${n._id}')">Mark read</button>` : ''}
            </div>
        `).join('');
    }

    window.markRead = async (id) => {
        try {
            await fetch(`${API_URL}/notifications/${id}/read`, {
                method: 'PUT',
                headers: { 'x-auth-token': token }
            });
            fetchNotifications();
        } catch (err) {
            console.error(err);
        }
    };

    markAllBtn.onclick = async () => {
        try {
            await fetch(`${API_URL}/notifications/read-all`, {
                method: 'PUT',
                headers: { 'x-auth-token': token }
            });
            fetchNotifications();
        } catch (err) {
            console.error(err);
        }
    };

    fetchNotifications();
    // Poll for new notifications every 30 seconds
    setInterval(fetchNotifications, 30000);
</script>
</body>
</html>
