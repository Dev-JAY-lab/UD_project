<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanDiary Profile</title>
  <link rel="stylesheet" href="style/styles.css">
</head>

<body>

  <nav>
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <div class="logo">UrbanDiary</div>

    <div class="nav-links">
      <a href="blog.html">Blogs</a>
      <a href="profile.html">Profile</a>
      <a href="library.html">Library</a>
      <a href="notifications.html" class="nav-link-notif">Notifications <span id="notifBadge" class="unread-badge" style="display:none">0</span></a>
      <a href="about.html">About</a>
      <a href="contactus.html">Contact Us</a>
    </div>

    <div class="user-info">
      <span id="userName" class="user-name"></span>
      <button class="btn-logout" id="logoutBtn">Logout ➜]</button>
    </div>

    <button class="toggle-btn" onclick="toggleDark()"><img src="assets/dark-mode-6682.svg" alt="Toggle"></button>
  </nav>

  <div class="wrapper">

    <!-- LEFT -->
    <div>

      <div class="profile-card">
        <h2>Write a Blog</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
          <input type="text" id="blogTitle" placeholder="Blog Title (or Topic for AI)..."
            style="width: 76%; padding: 45px; border: 1px solid #ddd; border-radius: 4px;">
          <button class="ai-magic-btn" id="aiBtn" onclick="generateAI()">✨ AI Write</button>
        </div>
        <textarea id="blogText" placeholder="Write your blog here..."></textarea>
        <input type="file" id="blogImage" accept="image/*">
        <input type="text" id="imageCaption" placeholder="Image caption (optional)">
        <button class="toggle-btn" style="margin-top:10px; width:40%; padding: 12px; font-weight:bold; font-size: 16px;"
          onclick="postBlog()">Post</button>
      </div>

      <div id="blogContainer"></div>

    </div>

    <!-- RIGHT PROFILE -->
    <div class="sidebar-profile">
      <div class="avatar-container" onclick="document.getElementById('profilePicInput').click()" style="cursor:pointer; position:relative; width: 80px; margin: 0 auto 15px;">
        <div class="avatar" id="avatarLetter" style="width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 32px;">D</div>
        <img id="profileImage" src="" style="display:none; width:80px; height:80px; border-radius:50%; object-fit:cover;">
        <div class="avatar-overlay" style="position:absolute; bottom:0; right:0; background:var(--primary); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg);">
          <span style="color:white; font-size:12px;">📷</span>
        </div>
      </div>
      <input type="file" id="profilePicInput" style="display:none" accept="image/*" onchange="uploadProfilePic(this)">
      <h3 id="profileName">DemoUser</h3>
      <div class="username" id="profileUsername"></div>
      <div class="bio" id="profileBio">Blogger</div>

      <div class="social">
        <a id="instaLink" href="#" target="_blank">Instagram</a>
      </div>

      <div class="edit" onclick="editProfile()">Edit Profile</div>

    </div>

  </div>
  <footer>
    © 2026 UrbanDiary | Designed with Love
  </footer>
  <script src="js/auth.js"></script>
  <script type="module" src="js/profile.js" defer></script>
</body>

</html>
